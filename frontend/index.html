<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Pulse — Rovereto Emotional Intelligence</title>

    <script src="js/map.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>


    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    <!-- Leaflet Heat Plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-heat/0.2.0/leaflet-heat.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-white overflow-hidden">

<!-- Main Container -->
<div class="flex h-screen w-screen">

    <!-- Map Container -->
    <div id="map" class="flex-1"></div>

    <!-- Control Panel (Left Sidebar) -->
    <div class="w-80 bg-gray-800 border-l border-gray-700 flex flex-col p-4 shadow-2xl">

        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-amber-400">City Pulse</h1>
            <p class="text-gray-400 text-sm mt-1">Emotional Intelligence for Rovereto</p>
        </div>

        <!-- Emotion Layer Selector -->
        <div class="mb-6">
            <p class="text-gray-300 text-sm font-semibold mb-3">Select Emotion Layer</p>
            <div class="space-y-2">
                <button class="emotion-btn w-full text-left px-4 py-2 rounded bg-gray-700 hover:bg-amber-500 transition text-sm" data-emotion="cultural_energy">🎨 Cultural Energy</button>
                <button class="emotion-btn w-full text-left px-4 py-2 rounded bg-gray-700 hover:bg-red-500 transition text-sm" data-emotion="mobility_anxiety">🚗 Mobility Anxiety</button>
                <button class="emotion-btn w-full text-left px-4 py-2 rounded bg-gray-700 hover:bg-green-500 transition text-sm" data-emotion="family_security">👨‍👩‍👧‍👦 Family Security</button>
                <button class="emotion-btn w-full text-left px-4 py-2 rounded bg-gray-700 hover:bg-purple-500 transition text-sm" data-emotion="bureaucratic_friction">📋 Bureaucratic Friction</button>
                <button class="emotion-btn w-full text-left px-4 py-2 rounded bg-gray-700 hover:bg-blue-900 transition text-sm" data-emotion="isolation_risk">🏚️ Isolation Risk</button>
            </div>
        </div>

        <!-- District Info Panel -->
        <div id="info-panel" class="flex-1 bg-gray-900 rounded p-4 border border-gray-700 overflow-y-auto hidden">
            <h2 id="district-name" class="text-xl font-bold text-amber-400 mb-3"></h2>
            <div id="district-scores" class="space-y-2 text-sm"></div>
            <p id="district-explanation" class="text-gray-400 text-xs mt-4 leading-relaxed"></p>
        </div>

    </div>

</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="js/api.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
